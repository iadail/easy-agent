model:
  provider: deepseek
  protocol: auto
  model: deepseek-chat
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  timeout_seconds: 60
  max_tokens: 2048
  temperature: 0.1

graph:
  name: baseline
  entrypoint: coordinator
  agents:
    - name: coordinator
      description: Execute the current task increment and use available tools when they help.
      system_prompt: |
        You are the coordinator agent. Use available tools or delegate to sub-agents.
      tools:
        - github_issue_list
        - github_issue_prepare_fix
        - git_commit_local
        - github_release_publish
        - python_echo
        - command_echo
      sub_agents:
        - analyst
      max_iterations: 6
    - name: analyst
      description: Prepare kickoff summaries and evaluate whether the work contract is complete.
      system_prompt: |
        You are a focused analyst who prepares kickoff summaries and evaluates completion.
      tools:
        - python_echo
      sub_agents: []
      max_iterations: 4
  nodes: []

harnesses:
  - name: repo_delivery_loop
    initializer_agent: analyst
    worker_target: coordinator
    evaluator_agent: analyst
    completion_contract: Deliver one useful repository update and explain the outcome clearly.
    artifacts_dir: .easy-agent/harness
    max_cycles: 4
    max_replans: 1

plugins: []

skills:
  - path: .easy-agent/local-skills/github_automation
    optional: true
  - path: skills/examples

mcp: []

storage:
  path: .easy-agent
  database: state.db

logging:
  level: INFO

security:
  allowed_commands:
    - ["cmd", "/c", "echo"]
  sandbox:
    mode: auto
    targets:
      - command_skill
      - stdio_mcp
    env_allowlist:
      - PATH
      - PATHEXT
      - SYSTEMROOT
      - WINDIR
      - COMSPEC
      - TEMP
      - TMP
      - USERPROFILE
      - HOME
      - APPDATA
      - LOCALAPPDATA
      - USERNAME
      - HOMEDRIVE
      - HOMEPATH
      - PROGRAMDATA
      - PUBLIC
      - DEEPSEEK_API_KEY
    working_root: .
    windows_sandbox_fallback: process
